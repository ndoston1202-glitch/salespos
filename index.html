<!doctype html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SalesPOS — Kafe boshqaruv tizimi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: {
        brand: { 50:'#fff7ed',100:'#ffedd5',200:'#fed7aa',300:'#fdba74',400:'#fb923c',
                 500:'#f97316',600:'#ea580c',700:'#c2410c',800:'#9a3412',900:'#7c2d12' }
      }}}
    }
  </script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
    [v-cloak] { display: none; }
  </style>
</head>
<body class="bg-slate-100">
  <div id="app"></div>

  <script>
  // ============================================================
  //  SalesPOS - Frontend (vanilla JS, build kerak emas)
  // ============================================================
  const API = '/api';
  let TOKEN = localStorage.getItem('token') || '';
  let USER = JSON.parse(localStorage.getItem('user') || 'null');
  let STATE = { page: 'dashboard', data: {} };

  // ---- API helper ----
  async function api(path, opts = {}) {
    const headers = { 'Content-Type': 'application/json' };
    if (TOKEN) headers['Authorization'] = 'Token ' + TOKEN;
    const res = await fetch(API + path, { ...opts, headers,
      body: opts.body ? JSON.stringify(opts.body) : undefined });
    if (res.status === 401) { logout(); throw new Error('auth'); }
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.detail || 'Xatolik');
    return data;
  }

  function money(n) { return Number(n || 0).toLocaleString('uz-UZ') + " so'm"; }
  function toast(msg, type='success') {
    const t = document.createElement('div');
    const bg = type === 'error' ? 'bg-red-500' : 'bg-green-500';
    t.className = `fixed top-5 right-5 ${bg} text-white px-5 py-3 rounded-xl shadow-lg z-50 text-sm font-medium`;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2500);
  }

  function logout() {
    TOKEN = ''; USER = null;
    localStorage.removeItem('token'); localStorage.removeItem('user');
    render();
  }

  // ---- LOGIN ----
  function renderLogin() {
    document.getElementById('app').innerHTML = `
      <div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-orange-50 to-orange-100 p-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-8">
          <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-brand-500 rounded-2xl mb-4 text-3xl">🍽️</div>
            <h1 class="text-2xl font-bold text-slate-800">SalesPOS</h1>
            <p class="text-slate-500 mt-1">Kafe boshqaruv tizimi</p>
          </div>
          <form id="loginForm" class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">Foydalanuvchi</label>
              <input id="lg_user" value="admin" class="w-full border border-slate-300 rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-brand-400 focus:border-transparent outline-none" />
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">Parol</label>
              <input id="lg_pass" type="password" value="admin123" class="w-full border border-slate-300 rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-brand-400 focus:border-transparent outline-none" />
            </div>
            <button class="w-full bg-brand-500 hover:bg-brand-600 text-white font-medium py-2.5 rounded-lg transition">Kirish</button>
          </form>
          <p class="text-center text-xs text-slate-400 mt-6">SalesPOS v1.0 · admin / admin123</p>
        </div>
      </div>`;
    document.getElementById('loginForm').onsubmit = async (e) => {
      e.preventDefault();
      try {
        const r = await api('/login/', { method: 'POST',
          body: { username: lg_user.value, password: lg_pass.value } });
        TOKEN = r.token; USER = r.user;
        localStorage.setItem('token', TOKEN); localStorage.setItem('user', JSON.stringify(USER));
        toast('Xush kelibsiz, ' + USER.full_name + '!');
        STATE.page = 'dashboard'; render();
      } catch (err) { toast(err.message, 'error'); }
    };
  }

  // ---- render boshqaruvi (sahifalar pastda) ----
  function render() {
    if (!TOKEN || !USER) { renderLogin(); return; }
    renderApp();
  }

  window.addEventListener('DOMContentLoaded', render);
  </script>
  <script src="/static/app.js"></script>
</body>
</html>
